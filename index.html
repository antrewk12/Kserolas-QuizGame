<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Cherry+Bomb+One&family=Manrope:wght@200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oi&family=Poetsen+One&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Kserolas</title>
</head>
<body>
    <div id="window">
        <div id="title">
            <h1>Ξερόλας</h1>
        </div>
        <div class="quiz-box">
            <div class="time" id="time">
                <span id="timeBox">10</span>
                 <svg>
                    <circle cx="75" cy="75" r="70"></circle>
                    <circle cx="75" cy="75" r="70"></circle>
                 </svg> 
            </div>
            <button id="strButton">Nέο Quiz</button>
            <button id="categoryButton">Κατηγορίες</button>
            <div id="categories"></div>
            <div id="quiz" class="quiz">
                <h2 id="questions"></h2>
                <div id="answers"></div>
                <p id="score"></p>
            </div>
        </div>
    </div>

<script src="script.js"></script>
</body>
</html>
